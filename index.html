<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positive Narrative</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#020408;
    color:white;
    font-family:Arial, sans-serif;
}

/* HERO */

.hero{
    height:100vh;
    background-image:url("hero-bg.png");
    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:flex-end;

    padding-bottom:55px;
}

.start-btn{
    padding:14px 34px;
    border:1px solid rgba(255,255,255,0.75);
    border-radius:40px;

    color:white;
    text-decoration:none;
    letter-spacing:2px;
    font-weight:bold;

    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(8px);

    transition:0.3s ease;
}

.start-btn:hover{
    background:white;
    color:black;
}

/* CLEAN SEPARATION */

.spacer{
    height:25vh;
    background:linear-gradient(#020408, #071018, #020408);
}

/* TRAFFIC MENU */

.traffic-section{
    height:100vh;
    background-image:url("traffic-menu.png");
    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;

    position:relative;
    overflow:hidden;
}

/* CLICK ZONES */

.zone{
    position:absolute;

    left:50%;
    transform:translate(-50%, -50%);

    width:150px;
    height:150px;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    color:white;
    text-decoration:none;

    font-weight:900;
    font-size:20px;
    line-height:1.05;
    letter-spacing:1.4px;
    text-transform:uppercase;

    text-shadow:
        0 3px 8px black,
        0 0 16px rgba(255,255,255,0.75);

    transition:0.3s ease;
}

/* coordinates for traffic-menu.png */
.stop-zone{
    top:31%;
}

.pause-zone{
    top:54%;
}

.go-zone{
    top:78%;
}

/* HOVER EFFECTS */

.zone span{
    transition:0.3s ease;
}

.zone:hover{
    transform:translate(-50%, -50%) scale(1.08);
}

.zone:hover span{
    transform:scale(1.08);
}

.stop-zone:hover{
    box-shadow:
        0 0 55px rgba(255,0,0,0.95),
        0 0 130px rgba(255,0,0,0.65),
        inset 0 0 55px rgba(255,0,0,0.35);
}

.pause-zone:hover{
    box-shadow:
        0 0 55px rgba(255,170,0,0.95),
        0 0 130px rgba(255,170,0,0.65),
        inset 0 0 55px rgba(255,170,0,0.35);
}

.go-zone:hover{
    box-shadow:
        0 0 55px rgba(0,255,120,0.95),
        0 0 130px rgba(0,255,120,0.65),
        inset 0 0 55px rgba(0,255,120,0.35);
}

/* MOBILE */

@media(max-width:768px){
    .hero{
        background-position:center center;
    }

    .traffic-section{
        background-position:center center;
    }

    .zone{
    width:115px;
    height:115px;
    font-size:15px;
}

.stop-zone{
    top:33.5%;
}

.pause-zone{
    top:54.2%;
}

.go-zone{
    top:77.8%;
}
}
</style>
</head>

<body>

<section class="hero">
    <a href="#traffic" class="start-btn">SCROLL TO BEGIN</a>
</section>

<div class="spacer"></div>

<section class="traffic-section" id="traffic">

    <a href="stop.html" class="zone stop-zone">
        <span>Stop<br>Thinking</span>
    </a>

    <a href="pause.html" class="zone pause-zone">
        <span>Pause<br>Thinking</span>
    </a>

    <a href="go.html" class="zone go-zone">
        <span>Let's<br>Go</span>
    </a>

</section>

</body>
</html>
